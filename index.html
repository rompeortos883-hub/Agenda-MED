<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Guardianes</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #020024 0%, #00d4ff 100%); min-height: 100vh; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); height: fit-content; }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        form { display: flex; flex-direction: column; gap: 12px; }
        input, select, button { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { background: #4A90E2; color: white; border: none; cursor: pointer; font-weight: bold; }
        .table-container { margin-top: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 5px 8px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 Agendar Cita</h2>
    <form id="appointmentForm">
        <input type="text" id="patientName" placeholder="Nombre del Paciente" required>
        <select id="doctorSelect" required>
            <option value="">Selecciona Doctor</option>
            <option value="Dra. Claudia Orellana">Dra. Claudia Orellana</option>
            <option value="Dr. Cristian López">Dr. Cristian López</option>
        </select>
        <input type="date" id="appointmentDate" required>
        <input type="time" id="appointmentTime" required>
        <button type="submit">Agendar Cita</button>
    </form>

    <div class="table-container">
        <table id="appointmentTable">
            <thead>
                <tr>
                    <th>Paciente</th>
                    <th>Doctor</th>
                    <th>Hora</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://agenda-guardianes-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const appointmentsRef = ref(db, 'citas');

    const form = document.getElementById('appointmentForm');
    const tableBody = document.querySelector('#appointmentTable tbody');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const appointment = {
            patient: document.getElementById('patientName').value,
            doctor: document.getElementById('doctorSelect').value,
            date: document.getElementById('appointmentDate').value,
            time: document.getElementById('appointmentTime').value
        };

        push(appointmentsRef, appointment).then(() => {
            form.reset();
        });
    });

    onValue(appointmentsRef, (snapshot) => {
        const data = snapshot.val();
        tableBody.innerHTML = '';
        
        // Obtenemos la fecha de ayer para no borrar lo de hoy por error
        const ayer = new Date();
        ayer.setDate(ayer.getDate() - 1);
        const fechaAyerStr = ayer.toISOString().split('T')[0];

        if (data) {
            Object.keys(data).forEach(key => {
                const appData = data[key];

                // Solo borra si la fecha es estrictamente anterior a ayer
                if (appData.date < fechaAyerStr) {
                    remove(ref(db, `citas/${key}`));
                    return;
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${appData.patient}</td>
                    <td>${appData.doctor.split(' ')[1]}</td>
                    <td>${appData.time}</td>
                    <td><button class="delete-btn" onclick="window.eliminarCita('${key}')">X</button></td>
                `;
                tableBody.appendChild(row);
            });
        }
    });

    window.eliminarCita = (key) => {
        remove(ref(db, `citas/${key}`));
    };
</script>
</body>
</html>
