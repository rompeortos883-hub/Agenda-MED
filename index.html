<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Guardianes</title>
    <style>
        body { font-family: Arial, sans-serif; background-image: linear-gradient(#020024, #00d4ff); padding: 110px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        form { display: grid; gap: 15px; margin-bottom: 30px; }
        input, select, button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { background-color: #4A90E2; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #357abd; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; color: #333; }
        .delete-btn { background-color: #ff4d4d; padding: 5px 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 Agendar Cita Médica</h2>
    
    <form id="appointmentForm">
        <input type="text" id="patientName" placeholder="Nombre del Paciente" required>
        <select id="doctorSelect" required>
            <option value="">Selecciona Doctor</option>
            <option value="Dra. Claudia Orellana">Dra. Claudia Orellana</option>
            <option value="Dr. Cristian López">Dr. Cristian López</option>
        </select>
        <input type="date" id="appointmentDate" required>
        <input type="time" id="appointmentTime" required>
        <button type="submit">Agendar Cita</button>
    </form>

    <hr>

    <h2>📋 Citas Programadas</h2>
    <table id="appointmentTable">
        <thead>
            <tr>
                <th>Paciente</th>
                <th>Doctor</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    const form = document.getElementById('appointmentForm');
    const tableBody = document.querySelector('#appointmentTable tbody');

    // Cargar citas guardadas al iniciar
    document.addEventListener('DOMContentLoaded', displayAppointments);

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const appointment = {
            id: Date.now(),
            patient: document.getElementById('patientName').value,
            doctor: document.getElementById('doctorSelect').value,
            date: document.getElementById('appointmentDate').value,
            time: document.getElementById('appointmentTime').value
        };

        saveAppointment(appointment);
        form.reset();
        displayAppointments();
    });

    function saveAppointment(item) {
        let appointments = JSON.parse(localStorage.getItem('citas')) || [];
        appointments.push(item);
        localStorage.setItem('citas', JSON.stringify(appointments));
    }

    function displayAppointments() {
        let appointments = JSON.parse(localStorage.getItem('citas')) || [];
        tableBody.innerHTML = '';

        appointments.forEach(app => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${app.patient}</td>
                <td>${app.doctor}</td>
                <td>${app.date}</td>
                <td>${app.time}</td>
                <td><button class="delete-btn" onclick="deleteApp(${app.id})">Eliminar</button></td>
            `;
            tableBody.appendChild(row);
        });
    }

    function deleteApp(id) {
        let appointments = JSON.parse(localStorage.getItem('citas')) || [];
        appointments = appointments.filter(app => app.id !== id);
        localStorage.setItem('citas', JSON.stringify(appointments));
        displayAppointments();
    }
</script>

</body>
</html>
