<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Guardianes</title>
    <style>
        body { font-family: Arial, sans-serif; background-image: linear-gradient(#020024, #00d4ff); padding: 110px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        form { display: grid; gap: 15px; margin-bottom: 30px; }
        input, select, button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { background-color: #4A90E2; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #357abd; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; color: #333; }
        .delete-btn { background-color: #ff4d4d; padding: 5px 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 Agendar Cita Médica</h2>
    
    <form id="appointmentForm">
        <input type="text" id="patientName" placeholder="Nombre del Paciente" required>
        <select id="doctorSelect" required>
            <option value="">Selecciona Doctor</option>
            <option value="Dra. Claudia Orellana">Dra. Claudia Orellana</option>
            <option value="Dr. Cristian López">Dr. Cristian López</option>
        </select>
        <input type="date" id="appointmentDate" required>
        <input type="time" id="appointmentTime" required>
        <button type="submit">Agendar Cita</button>
    </form>

    <hr>

    <h2>📋 Citas Programadas</h2>
    <table id="appointmentTable">
        <thead>
            <tr>
                <th>Paciente</th>
                <th>Doctor</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://agenda-guardianes-default-rtdb.firebaseio.com" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const appointmentsRef = ref(db, 'citas');

    const form = document.getElementById('appointmentForm');
    const tableBody = document.querySelector('#appointmentTable tbody');

    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const appointment = {
            patient: document.getElementById('patientName').value,
            doctor: document.getElementById('doctorSelect').value,
            date: document.getElementById('appointmentDate').value,
            time: document.getElementById('appointmentTime').value,
            notified: false 
        };
        push(appointmentsRef, appointment);
        form.reset();
    });

    //  CAMBIA PARA LA LIMPIEZA
    onValue(appointmentsRef, (snapshot) => {
        const data = snapshot.val();
        tableBody.innerHTML = '';
        
        if (data) {
            const hoy = new Date().toISOString().split('T')[0]; // Fecha actual YYYY-MM-DD

            Object.keys(data).forEach(key => {
                const app = data[key];

                // --- LÓGICA DE AUTO-LIMPIEZA ---
                if (app.date < hoy) {
                    remove(ref(db, `citas/${key}`)); // Borra de la nube si es de ayer o antes
                    return; // Se salta esta cita y no la dibuja en la tabla
                }
                // -------------------------------

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${app.patient}</td>
                    <td>${app.doctor}</td>
                    <td>${app.date}</td>
                    <td>${app.time}</td>
                    <td><button class="delete-btn" data-id="${key}">Eliminar</button></td>
                `;
                tableBody.appendChild(row);
                checkAlarm(app);
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = () => remove(ref(db, `citas/${btn.getAttribute('data-id')}`));
            });
        }
    });

    function checkAlarm(app) {
        const now = new Date();
        const appTime = new Date(`${app.date}T${app.time}`);
        const diff = (appTime - now) / 1000 / 60;

        if (diff > 4.8 && diff <= 5 && Notification.permission === "granted") {
            new Notification("⚠️ Próxima Cita", {
                body: `En 5 minutos: ${app.patient} con ${app.doctor}`,
                icon: "https://cdn-icons-png.flaticon.com/512/1048/1048953.png"
            });
        }
    }
</script>
</body>
</html>
