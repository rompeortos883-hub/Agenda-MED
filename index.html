<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Médica - Guardianes</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #020024 0%, #00d4ff 100%); min-height: 100vh; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        form { display: flex; flex-direction: column; gap: 12px; }
        input, select, button { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { background: #4A90E2; color: white; border: none; cursor: pointer; font-weight: bold; }
        .table-container { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 0; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 Nueva Cita</h2>
    <form id="appointmentForm">
        <input type="text" id="patientName" placeholder="Nombre del Paciente" required>
        <select id="doctorSelect" required>
            <option value="">Selecciona Doctor</option>
            <option value="Dra. Claudia Orellana">Dra. Claudia Orellana</option>
            <option value="Dr. Cristian López">Dr. Cristian López</option>
        </select>
        <input type="date" id="appointmentDate" required>
        <input type="time" id="appointmentTime" required>
        <button type="submit">Guardar en Agenda</button>
    </form>

    <div class="table-container">
        <h3 style="text-align:center; color:#7f8c8d;">Citas Registradas</h3>
        <table id="appointmentTable">
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://agenda-guardianes-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const appointmentsRef = ref(db, 'citas');

    const form = document.getElementById('appointmentForm');
    const tableBody = document.querySelector('#appointmentTable tbody');

    // Pedir permiso para notificaciones al cargar
    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const appointment = {
            patient: document.getElementById('patientName').value,
            doctor: document.getElementById('doctorSelect').value,
            date: document.getElementById('appointmentDate').value,
            time: document.getElementById('appointmentTime').value,
            notified: false // Para que no repita la alarma
        };

        push(appointmentsRef, appointment).then(() => {
            form.reset();
        });
    });

    onValue(appointmentsRef, (snapshot) => {
        const data = snapshot.val();
        tableBody.innerHTML = '';
        if (data) {
            Object.keys(data).forEach(key => {
                const appData = data[key];
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <strong>${appData.patient}</strong><br>
                        <small>🩺 ${appData.doctor}</small><br>
                        <small>📅 ${appData.date} - ⏰ ${appData.time}</small>
                    </td>
                    <td style="vertical-align: middle;">
                        <button class="delete-btn" onclick="window.borrarCita('${key}')">Borrar</button>
                    </td>
                `;
                tableBody.appendChild(row);
                
                // Activar chequeo de alarma
                verificarAlarma(appData);
            });
        }
    });

    function verificarAlarma(cita) {
        const ahora = new Date();
        const horaCita = new Date(`${cita.date}T${cita.time}`);
        const diferenciaMinutos = (horaCita - ahora) / 1000 / 60;

        // Si faltan entre 4 y 5 minutos, tira la notificación
        if (diferenciaMinutos > 4.8 && diferenciaMinutos <= 5) {
            if (Notification.permission === "granted") {
                new Notification("⚠️ Cita Próxima", {
                    body: `En 5 min: ${cita.patient} con ${cita.doctor}`,
                    icon: "https://cdn-icons-png.flaticon.com/512/1048/1048953.png"
                });
            }
        }
    }

    window.borrarCita = (key) => {
        if(confirm("¿Eliminar esta cita?")) {
            remove(ref(db, `citas/${key}`));
        }
    };
</script>
</body>
</html>
