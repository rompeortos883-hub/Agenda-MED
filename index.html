<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Médica - Formato Calendario</title>
    
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #020024 0%, #00d4ff 100%); 
            min-height: 100vh; margin: 0; padding: 20px; 
        }
        .main-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1300px;
            margin: auto;
        }
        .form-container { 
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); height: fit-content; 
        }
        .calendar-container {
            flex: 2;
            min-width: 350px;
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        form { display: flex; flex-direction: column; gap: 12px; }
        input, select, button { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { background: #4A90E2; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #357ABD; }

        /* --- FUERZA BRUTA PARA TEXTO COMPLETO EN EVENTOS --- */
        .fc-event {
            white-space: normal !important;
            height: auto !important;
            margin-bottom: 3px !important;
            border: none !important;
            padding: 2px !important;
        }
        .fc-daygrid-event {
            white-space: normal !important;
            display: block !important;
        }
        .fc-event-main {
            white-space: normal !important;
            overflow: visible !important;
            word-wrap: break-word !important;
        }
        .fc-event-title {
            white-space: normal !important;
            text-overflow: clip !important;
            font-weight: 600 !important;
            font-size: 0.85em !important;
        }
        .fc-daygrid-event-harness {
            margin-bottom: 2px !important;
        }
    </style>
</head>
<body onclick="solicitarPermiso()">

<div class="main-wrapper">
    <div class="form-container">
        <h2>📅 Nueva Cita</h2>
        <form id="appointmentForm">
            <input type="text" id="patientName" placeholder="Nombre del Paciente" required>
            <select id="doctorSelect" required>
                <option value="">Selecciona Doctor</option>
                <option value="Dra. Claudia Orellana">Dra. Claudia Orellana</option>
                <option value="Dr. Cristian López">Dr. Cristian López</option>
            </select>
            <input type="date" id="appointmentDate" required>
            <input type="time" id="appointmentTime" required>
            <button type="submit">Guardar en Agenda</button>
        </form>
        <p style="font-size: 12px; color: #7f8c8d; margin-top: 20px; text-align: center;">
            * Haz clic en una cita en el calendario para eliminarla.
        </p>
    </div>

    <div class="calendar-container">
        <div id="calendar"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://agenda-guardianes-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const appointmentsRef = ref(db, 'citas');

    const form = document.getElementById('appointmentForm');
    const yaNotificados = new Set();
    let calendar;

    // Inicializar Calendario
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'es',
            height: 'auto',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek'
            },
            buttonText: {
                today: 'Hoy',
                month: 'Mes',
                week: 'Semana'
            },
            eventClick: function(info) {
                if(confirm(`¿Deseas eliminar la cita de: ${info.event.title}?`)) {
                    window.borrarCita(info.event.id);
                }
            }
        });
        calendar.render();
    });

    window.solicitarPermiso = () => {
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }
    };

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const appointment = {
            patient: document.getElementById('patientName').value,
            doctor: document.getElementById('doctorSelect').value,
            date: document.getElementById('appointmentDate').value,
            time: document.getElementById('appointmentTime').value
        };

        push(appointmentsRef, appointment).then(() => {
            form.reset();
        });
    });

    onValue(appointmentsRef, (snapshot) => {
        const data = snapshot.val();
        const events = [];
        
        if (data) {
            Object.keys(data).forEach(key => {
                const appData = data[key];
                
                events.push({
                    id: key,
                    title: `${appData.time} - ${appData.patient} (${appData.doctor})`,
                    start: `${appData.date}T${appData.time}`,
                    // Naranja para Dra. Claudia, Verde para Dr. Cristian
                    backgroundColor: appData.doctor.includes('Claudia') ? '#f39c12' : '#27ae60',
                    textColor: '#ffffff'
                });

                verificarAlarma(appData, key);
            });
        }
        
        calendar.removeAllEvents();
        calendar.addEventSource(events);
    });

    function verificarAlarma(cita, id) {
        const ahora = new Date();
        const horaCita = new Date(`${cita.date}T${cita.time}`);
        const dif = (horaCita - ahora) / 1000 / 60;

        if (dif > 0 && dif <= 10 && !yaNotificados.has(id)) {
            if (Notification.permission === "granted") {
                new Notification("⚠️ Cita Próxima", {
                    body: `Paciente: ${cita.patient} con ${cita.doctor} a las ${cita.time}`,
                    icon: "https://cdn-icons-png.flaticon.com/512/1048/1048953.png"
                });
                yaNotificados.add(id);
            }
        }
    }

    window.borrarCita = (key) => {
        yaNotificados.delete(key);
        remove(ref(db, `citas/${key}`));
    };

    setInterval(() => {
        onValue(appointmentsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(key => verificarAlarma(data[key], key));
            }
        }, { onlyOnce: true });
    }, 30000);

</script>
</body>
</html>
